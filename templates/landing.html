{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Django Blog</title>

    <style>
        :root {
            --primary: #c97a2b;
            --bg: #f8f6f3;
            --text: #2c2c2c;
            --muted: #777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 60px;
            border-bottom: 1px solid #e5e5e5;
            background: white;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-buttons a {
            text-decoration: none;
            margin-left: 12px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
        }

        .login {
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .register {
            background: var(--primary);
            color: white;
        }

        .login:hover {
            background: var(--primary);
            color: white;
        }

        .register:hover {
            opacity: 0.9;
        }

        /* Hero Section */
        .hero {
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hero-content {
            max-width: 700px;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .hero p {
            color: var(--muted);
            font-size: 16px;
            margin-bottom: 25px;
        }

        .hero a {
            text-decoration: none;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            margin: 5px;
            display: inline-block;
        }

        .hero a.secondary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .hero a:hover {
            opacity: 0.9;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #e5e5e5;
            font-size: 14px;
            color: var(--muted);
            background: white;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">

        <div class="logo">TheBloggers</div>

        <div class="nav-buttons">
            <a href="{% url 'login' %}" class="login">Login</a>
            <a href="{% url 'register' %}" class="register">Register</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <div class="hero-content">
            <h1>Welcome to Django Blog</h1>
            <p>
                Discover amazing articles on technology, health, science, and more.
                Join us and start sharing your ideas today.
            </p>

            <a href="{% url 'login' %}">Get Started</a>
            <a href="{% url 'register' %}" class="secondary">Create Account</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Django Blog — Built with ❤️ using Django
    </div>

</body>
</html>
