<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #faf8f4;
      color: #4a4640;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .container { max-width: 480px; }

    .logo {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1814;
      letter-spacing: -.04em;
      display: block;
      margin-bottom: 3rem;
      text-decoration: none;
    }

    .error-num {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 700;
      font-style: italic;
      color: #c8803a;
      line-height: 1;
      margin-bottom: .25rem;
      letter-spacing: -.04em;
    }

    h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 400;
      color: #4a4640;
      margin-bottom: 1rem;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(26,24,20,.12);
      margin: 1.5rem 0;
    }

    p {
      color: #8a8480;
      margin-bottom: 2rem;
      line-height: 1.7;
      font-size: .95rem;
    }

    a.home-btn {
      display: inline-block;
      padding: .65rem 1.75rem;
      background: #c8803a;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: .88rem;
      font-weight: 500;
      letter-spacing: .03em;
      transition: background .2s ease, transform .2s ease;
    }
    a.home-btn:hover {
      background: #9c5e22;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">Django Blog</a>
    <div class="error-num">404</div>
    <h2>Page Not Found</h2>
    <hr>
    <p>The page you're looking for doesn't exist or may have been moved.<br>Let's get you back on track.</p>
    <a href="/" class="home-btn">Go Back Home</a>
  </div>
</body>
</html>
