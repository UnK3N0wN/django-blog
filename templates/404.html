<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 1rem;
    }

    .container {
      max-width: 480px;
    }

    h1 {
      font-size: 6rem;
      font-weight: bold;
      color: #e74c3c;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #555;
    }

    p {
      color: #777;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 0.65rem 1.75rem;
      background: #e74c3c;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 0.95rem;
    }

    a:hover {
      background: #c0392b;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <hr>
    <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Go Back Home</a>
  </div>
</body>
</html>
